services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: scheduler
      MYSQL_ROOT_PASSWORD: scheduler
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  mysql_data:
